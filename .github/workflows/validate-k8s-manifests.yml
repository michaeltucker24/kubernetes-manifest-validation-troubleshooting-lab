name: Validate Kubernetes Manifests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Kubernetes YAML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify scenario directories exist
        run: |
          test -d scenarios/01-service-selector-mismatch
          test -d scenarios/02-invalid-image-reference
          test -d scenarios/03-port-mismatch
          test -d scenarios/04-missing-configmap

      - name: Install Python YAML dependency
        run: |
          python -m pip install pyyaml

      - name: Validate YAML syntax
        run: |
          python - <<'PY'
          import yaml
          from pathlib import Path

          yaml_files = list(Path("scenarios").rglob("*.yaml"))

          if not yaml_files:
              raise SystemExit("No YAML files found.")

          for file in yaml_files:
              with open(file, "r") as f:
                  yaml.safe_load(f)
              print(f"YAML syntax OK: {file}")
          PY

      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Validate fixed manifests with kubeconform
        run: |
          kubeconform -summary -strict scenarios/01-service-selector-mismatch/fixed/
          kubeconform -summary -strict scenarios/02-invalid-image-reference/fixed/
          kubeconform -summary -strict scenarios/03-port-mismatch/fixed/
          kubeconform -summary -strict scenarios/04-missing-configmap/fixed/
